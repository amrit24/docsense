services:
  chromadb:
    image: chromadb/chroma:1.5.3   # v2 API — required by Spring AI 1.0.1 ChromaApi
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
      - ALLOW_RESET=true
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local